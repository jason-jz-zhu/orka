<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <path d="M512 0 C 869 0 1024 155 1024 512 C 1024 869 869 1024 512 1024 C 155 1024 0 869 0 512 C 0 155 155 0 512 0 Z"/>
    </clipPath>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111a2e"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <radialGradient id="highlight" cx="30%" cy="18%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.24)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <radialGradient id="leadGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#highlight)"/>

    <g transform="translate(512 512)">
      <!-- outer soft halo (subtle glow around the ribbon) -->
      <circle r="290" fill="none"
              stroke="url(#ribbon)" stroke-width="108" stroke-opacity="0.18"
              stroke-linecap="round"
              stroke-dasharray="1520 1822"
              transform="rotate(-95)" filter="url(#softGlow)"/>

      <!-- main ribbon stroke -->
      <circle r="290" fill="none"
              stroke="url(#ribbon)" stroke-width="88"
              stroke-linecap="round"
              stroke-dasharray="1520 1822"
              transform="rotate(-95)"/>

      <!-- lead dot: bright white with radial highlight, slightly larger -->
      <circle cx="282" cy="-72" r="60" fill="url(#leadGlow)"/>
      <circle cx="282" cy="-72" r="44" fill="#ffffff"/>
      <circle cx="270" cy="-85" r="14" fill="rgba(255,255,255,0.85)"/>
    </g>
  </g>
</svg>
